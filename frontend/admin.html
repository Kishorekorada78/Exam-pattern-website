<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Submissions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="center-content align-start">
    <div class="admin-container">
        <div class="glass-container">
            <div class="header" style="text-align: left;">
                <h1>Admin Dashboard</h1>
                <p>Overview of all student submissions and tab switch infractions.</p>
                <button class="btn primary-btn sm mt-4" onclick="fetchStudents()">Refresh Data</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Roll Number</th>
                            <th>Email</th>
                            <th>Tab Switches</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Answers Modal -->
    <div id="overlay" class="overlay"></div>
    <div id="answersModal" class="modal glass-container" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: white;">Student Answers</h2>
            <button onclick="closeAnswersModal()" class="btn danger-btn sm">Close</button>
        </div>
        <div id="answersContainer" style="text-align: left;">
            <!-- Render answers -->
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
